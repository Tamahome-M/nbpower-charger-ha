<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1faa4d"/>
      <stop offset="100%" stop-color="#0d7a35"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe14d"/>
      <stop offset="100%" stop-color="#ffc400"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="104" ry="104" fill="url(#bg)"/>

  <!-- Charging station body -->
  <g fill="#ffffff">
    <!-- Main pillar -->
    <rect x="150" y="120" width="150" height="280" rx="24" ry="24"/>
  </g>

  <!-- Screen area -->
  <rect x="174" y="150" width="102" height="80" rx="12" ry="12" fill="#0d7a35"/>

  <!-- Lightning bolt on screen -->
  <path d="M232 162 L200 198 L222 198 L216 230 L250 188 L226 188 Z" fill="url(#bolt)"/>

  <!-- Charging cable/connector arm -->
  <path d="M300 200 q56 0 56 56 l0 70 q0 36 -36 36 l-14 0"
        fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round"/>

  <!-- Connector head -->
  <circle cx="306" cy="372" r="26" fill="#ffffff"/>
  <circle cx="306" cy="372" r="12" fill="#0d7a35"/>

  <!-- Base -->
  <rect x="132" y="392" width="186" height="36" rx="14" ry="14" fill="#ffffff"/>
</svg>
