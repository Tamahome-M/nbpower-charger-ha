    <!-- Connector -->
    <circle cx="145" cy="196" r="17" fill="#1faa4d"/>
    <circle cx="145" cy="196" r="8" fill="#ffffff"/>
    <!-- Base -->
    <rect x="28" y="194" width="124" height="24" rx="9" ry="9" fill="#1faa4d"/>
  </g>

  <!-- Text -->
  <text x="220" y="120" font-family="Arial, Helvetica, sans-serif" font-weight="700"
        font-size="64" fill="#1faa4d">NBPower</text>
  <text x="222" y="172" font-family="Arial, Helvetica, sans-serif" font-weight="400"
        font-size="34" fill="#888888">EV Charger</text>
</svg>
